name: Hook ZIP

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - ".github/workflows/hook-zip.yml"
      - "scripts/package_hook_zip.sh"
      - "settings.gradle.kts"
      - "test/**"
      - "lsplant/**"
      - "build.gradle.kts"
      - "gradle/**"

jobs:
  build-hook-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@master
        with:
          version: 1.12.1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Remove Android's cmake
        run: rm -rf "$ANDROID_HOME/cmake"

      - name: Build hook package
        id: package
        run: |
          chmod +x scripts/package_hook_zip.sh
          scripts/package_hook_zip.sh

      - name: Upload hook zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name || 'lsplant-hook-zip' }}
          path: ${{ steps.package.outputs.zip_path || 'dist/*.zip' }}
